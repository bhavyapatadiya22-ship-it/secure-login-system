<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h2>Admin Dashboard</h2>
<h3>Registered Users</h3>

<table>

<tr>
<th>ID</th>
<th>Username</th>
<th>Email</th>
<th>Role</th>
<th>Action</th>
</tr>

{% for user in users %}

<tr>
<td>{{ loop.index }}</td>
<td>{{ user.username }}</td>
<td>{{ user.email }}</td>
<td>{{ user.role }}</td>
<td><a href="/delete_user/{{ user.id }}">Delete</a></td>
</tr>

{% endfor %}

</table>

</div>

</body>
</html>
